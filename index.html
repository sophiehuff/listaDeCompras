<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minha Lista de Compras</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="decorative-circles">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
      <div class="circle circle-3"></div>
    </div>

    <div class="container">
      <header>
        <div class="header-decorations">
          <svg
            class="header-icon"
            viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg"
          >
            <!-- Maçã -->
            <circle
              cx="50"
              cy="55"
              r="35"
              fill="none"
              stroke="#880e4f"
              stroke-width="2"
              opacity="0.3"
            />
            <path
              d="M 50 20 Q 40 15 35 25"
              stroke="#880e4f"
              stroke-width="2"
              fill="none"
              opacity="0.4"
            />
          </svg>
          <svg
            class="header-icon"
            viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg"
          >
            <!-- Sacola de compras -->
            <path
              d="M 20 40 L 30 20 L 70 20 L 80 40 L 75 85 Q 75 90 70 90 L 30 90 Q 25 90 25 85 Z"
              stroke="#880e4f"
              stroke-width="2"
              fill="none"
              opacity="0.3"
            />
          </svg>
          <svg
            class="header-icon"
            viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg"
          >
            <!-- Cesta -->
            <path
              d="M 25 35 L 75 35 L 70 80 Q 70 85 65 85 L 35 85 Q 30 85 30 80 Z"
              stroke="#880e4f"
              stroke-width="2"
              fill="none"
              opacity="0.3"
            />
            <line
              x1="35"
              y1="35"
              x2="35"
              y2="80"
              stroke="#880e4f"
              stroke-width="1"
              opacity="0.3"
            />
            <line
              x1="50"
              y1="35"
              x2="50"
              y2="80"
              stroke="#880e4f"
              stroke-width="1"
              opacity="0.3"
            />
            <line
              x1="65"
              y1="35"
              x2="65"
              y2="80"
              stroke="#880e4f"
              stroke-width="1"
              opacity="0.3"
            />
          </svg>
        </div>
        <h1>Minha Lista de Compras</h1>
        <p class="subtitle">Organize suas compras com elegância</p>
      </header>

      <div class="input-section">
        <div class="input-group">
          <input
            type="text"
            id="itemInput"
            placeholder="Digite o item que deseja comprar..."
            class="item-input"
          />
          <select id="categorySelect" class="category-select">
            <option value="Alimentos">Alimentos</option>
            <option value="Limpeza">Limpeza</option>
            <option value="Higiene">Higiene</option>
            <option value="Roupas">Roupas</option>
            <option value="Outros">Outros</option>
          </select>
          <button id="addBtn" class="btn-add">Adicionar</button>
        </div>
      </div>

      <div class="list-section">
        <div class="list-header">
          <h2>Itens da Lista</h2>
          <div class="filter-buttons">
            <button class="filter-btn active" data-filter="todos">Todos</button>
            <button class="filter-btn" data-filter="pendentes">
              Pendentes
            </button>
            <button class="filter-btn" data-filter="comprados">
              Comprados
            </button>
          </div>
        </div>

        <ul id="shoppingList" class="shopping-list">
          <!-- Os itens serão adicionados aqui dinamicamente -->
        </ul>

        <div class="list-stats">
          <p>
            Total: <span id="totalItems">0</span> | Comprados:
            <span id="completedItems">0</span>
          </p>
        </div>
      </div>

      <footer class="footer">
        <p>Desenvolvido por <span class="author">Sophia M.</span></p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
